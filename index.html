<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fórmula APK - Premium Chat</title>
    <style>
        :root {
            --primary: #008069;
            --primary-dark: #005e4e;
            --bg-light: #f0f2f5;
            --chat-bg: #efeae2;
            --white: #ffffff;
            --sent: #dcf8c6;
            --received: #ffffff;
            --notify-color: #e67e22;
            --text-main: #111b21;
            --text-sub: #667781;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body { 
            background-color: #d1d7db; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: 100dvh;
            width: 100vw;
            color: #3b4a54; overflow: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 3000; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo {
            width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), #00bfa5);
            border-radius: 20px; display: flex; justify-content: center; align-items: center;
            color: white; font-size: 28px; font-weight: 900; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 128, 105, 0.2); animation: float 3s ease-in-out infinite;
        }
        .loader { width: 30px; height: 30px; border: 3px solid rgba(0, 128, 105, 0.1); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* Login */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-light); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: white; padding: 35px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 90%; max-width: 350px; }
        .login-box h2 { color: var(--primary); margin-bottom: 20px; font-weight: 800; }
        .login-box input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e1e1e1; margin-bottom: 15px; outline: none; text-align: center; }
        .login-box button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        /* App Layout */
        #app { 
            width: 100%; 
            max-width: 1000px; 
            height: 100%; 
            display: none; background: white; overflow: hidden; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.12);
            position: relative;
        }

        #main-chat { flex: 1; display: flex; flex-direction: column; background-color: var(--chat-bg); height: 100%; }
        
        header { background: rgba(248, 249, 250, 0.9); backdrop-filter: blur(10px); padding: 10px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 100; min-height: 60px; }
        .header-avatar { width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary), #00bfa5); border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; font-size: 14px; font-weight: bold; }
        .header-info p { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .status-row { display: flex; align-items: center; gap: 10px; margin-top: 1px; }

        #notifyBtn {
            background: none; border: none; color: var(--notify-color); font-size: 10px; font-weight: 800; 
            cursor: pointer; display: none; align-items: center; gap: 3px; padding: 3px 7px; 
            border-radius: 5px; background: rgba(230, 126, 34, 0.12);
        }

        .status-badge { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--primary); font-weight: 700; text-transform: uppercase; }
        .status-dot { width: 6px; height: 6px; background: #2ecc71; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); scroll-behavior: smooth; }
        
        .bubble { 
            max-width: 80%; 
            padding: 8px 12px; 
            border-radius: 10px; 
            font-size: 14px; 
            line-height: 1.4; 
            position: relative; 
            word-wrap: break-word; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
        }
        .highlight { background-color: #fffde7 !important; border: 1px solid #fbc02d; transform: scale(1.01); }
        .sender-name { display: block; font-size: 11px; font-weight: 700; margin-bottom: 3px; color: #d35400; cursor: pointer; }
        
        .reply-box { 
            background: rgba(0,0,0,0.03); 
            border-left: 2px solid var(--primary); 
            padding: 4px 8px; 
            margin-bottom: 6px; 
            border-radius: 4px; 
            font-size: 12px; 
            color: #666;
            max-height: 40px;
            overflow: hidden;
        }
        .reply-box strong { display: block; font-size: 10px; color: var(--primary); }

        .sent { background-color: var(--sent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background-color: var(--received); align-self: flex-start; border-bottom-left-radius: 2px; }
        .time { font-size: 9px; color: var(--text-sub); float: right; margin-top: 4px; margin-left: 8px; }

        footer { background-color: #f8f9fa; padding: 10px 15px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid rgba(0,0,0,0.05); }
        #reply-preview { background: #ffffff; border-left: 3px solid var(--primary); padding: 8px; border-radius: 8px; display: none; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 5px; }
        #cancel-reply { position: absolute; right: 12px; top: 8px; cursor: pointer; font-size: 16px; color: #bbb; }
        
        .input-row { display: flex; align-items: center; gap: 10px; }
        .input-area { flex: 1; background-color: #ffffff; border-radius: 20px; padding: 8px 16px; border: 1px solid #e1e1e1; }
        .input-area input { width: 100%; border: none; outline: none; background: none; font-size: 14px; height: 24px; }
        .send-btn { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-logo">APK</div>
    <div class="loader"></div>
</div>

<div id="login-screen">
    <div class="login-box">
        <h2>Fórmula APK</h2>
        <input type="text" id="userNameInput" placeholder="Seu apelido..." maxlength="15">
        <button id="enterChatBtn">ENTRAR</button>
    </div>
</div>

<div id="app">
    <main id="main-chat">
        <header>
            <div class="header-avatar">APK</div>
            <div class="header-info">
                <p>Chat Global Premium</p>
                <div class="status-row">
                    <button id="notifyBtn">🔔 Ver Resposta</button>
                    <div class="status-badge"><span class="status-dot"></span> LIVE</div>
                </div>
            </div>
        </header>
        <div id="chat-window"></div>
        <footer>
            <div id="reply-preview">
                <div id="cancel-reply">×</div>
                <span id="reply-user-label" style="font-size:10px; font-weight:800; color:var(--primary); text-transform: uppercase;"></span>
                <p id="reply-text-label" style="font-size:12px; color:#666; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px;"></p>
            </div>
            <div class="input-row">
                <div class="input-area"><input type="text" id="msgInput" placeholder="Mensagem..." autocomplete="off"></div>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </footer>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.visibility = 'hidden'; }, 800);
        }, 2000);
    });

    const firebaseConfig = {
      apiKey: "AIzaSyDMrqpOWBx4KwQ3RdorOsWwJp2xUVh4bX0",
      authDomain: "chat-a6f41.firebaseapp.com",
      projectId: "chat-a6f41",
      storageBucket: "chat-a6f41.firebasestorage.app",
      messagingSenderId: "704027996440",
      appId: "1:704027996440:web:abf03cf5df02d044eeae6d"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);
    const auth = getAuth(fbApp);
    
    let NOME_USUARIO = "";
    const MEU_ID = "user_" + Math.floor(Math.random() * 100000);
    let REPLY_DATA = null;
    let ULTIMA_RESPOSTA_ID = null;

    // Autenticação Silenciosa (Necessária para as novas regras de segurança)
    signInAnonymously(auth).catch(err => console.error("Erro Auth:", err));

    function linkify(text) {
        const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
    }

    document.getElementById('enterChatBtn').onclick = () => {
        const nome = document.getElementById('userNameInput').value.trim();
        if(nome) {
            NOME_USUARIO = nome;
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('app').style.display = "flex";
            carregarGlobal();
        }
    };

    window.setReply = (nome, texto) => {
        REPLY_DATA = { nome, texto, senderId: MEU_ID };
        document.getElementById('reply-user-label').innerText = "Respondendo a " + nome;
        document.getElementById('reply-text-label').innerText = texto;
        document.getElementById('reply-preview').style.display = "block";
        document.getElementById('msgInput').focus();
    };

    document.getElementById('cancel-reply').onclick = () => {
        REPLY_DATA = null;
        document.getElementById('reply-preview').style.display = "none";
    };

    document.getElementById('notifyBtn').onclick = () => {
        if(ULTIMA_RESPOSTA_ID) {
            const el = document.getElementById(ULTIMA_RESPOSTA_ID);
            if(el) {
                el.scrollIntoView();
                el.classList.add('highlight');
                setTimeout(() => el.classList.remove('highlight'), 3000);
            }
            document.getElementById('notifyBtn').style.display = "none";
        }
    };

    function carregarGlobal() {
        const q = query(collection(db, "mensagens_premium"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                const isMe = data.senderId === MEU_ID;
                const time = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                const div = document.createElement('div');
                div.className = `bubble ${isMe ? 'sent' : 'received'}`;
                div.id = doc.id;
                
                if(!isMe && data.replyTo && data.replyTo.nome === NOME_USUARIO) {
                    ULTIMA_RESPOSTA_ID = doc.id;
                    document.getElementById('notifyBtn').style.display = "flex";
                }

                const nomeHTML = `<span class="sender-name" onclick="setReply('${data.nome}', '${data.texto.replace(/'/g, "\\'")}')">${data.nome}</span>`;
                let replyHTML = data.replyTo ? `<div class="reply-box"><strong>${data.replyTo.nome}</strong>${data.replyTo.texto}</div>` : "";

                div.innerHTML = `${nomeHTML}${replyHTML}${linkify(data.texto)} <span class="time">${time}</span>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    async function enviar() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        
        // Garante que o usuário está autenticado antes de enviar
        if (!auth.currentUser) {
            await signInAnonymously(auth);
        }

        const payload = { 
            texto: input.value, 
            nome: NOME_USUARIO, 
            senderId: MEU_ID, 
            timestamp: serverTimestamp() 
        };
        
        if(REPLY_DATA) payload.replyTo = REPLY_DATA;
        
        try {
            await addDoc(collection(db, "mensagens_premium"), payload);
            input.value = ""; 
            REPLY_DATA = null; 
            document.getElementById('reply-preview').style.display = "none";
        } catch (e) {
            console.error("Erro ao enviar mensagem: ", e);
        }
    }

    document.getElementById('sendBtn').onclick = enviar;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
</script>
</body>
</html>
