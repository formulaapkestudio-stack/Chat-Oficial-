<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórmula APK - Chat Premium Light</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #f0f2f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #3b4a54;
        }

        /* Tela de Login Inicial */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .login-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .login-box h2 { margin-bottom: 20px; color: #008069; font-size: 24px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #008069;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        /* App Principal */
        #app {
            width: 100%;
            max-width: 450px;
            height: 95vh;
            display: none; 
            flex-direction: column;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e1e1e1;
        }

        header {
            background-color: #f0f2f5;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
            border-bottom: 1px solid #ddd;
        }

        .avatar { 
            width: 40px; height: 40px; 
            background: #008069; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; color: white;
        }

        .status-info p { font-size: 16px; font-weight: 600; color: #111b21; }
        .status-info span { font-size: 12px; color: #008069; }

        /* FUNDO CLARO TECH */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #efeae2; /* Cor clássica do fundo WhatsApp */
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            background-attachment: local;
        }

        /* Estilo das Bolhas */
        .bubble {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14.5px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .sender-name {
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #d55b00; /* Laranja para destacar nomes no claro */
        }

        .sent { 
            background-color: #dcf8c6; 
            align-self: flex-end; 
            border-top-right-radius: 0; 
            color: #111b21;
        }

        .received { 
            background-color: #ffffff; 
            align-self: flex-start; 
            border-top-left-radius: 0; 
            color: #111b21;
        }

        .time {
            font-size: 10px;
            color: #667781;
            margin-left: 10px;
            float: right;
            margin-top: 6px;
        }

        footer {
            background-color: #f0f2f5;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-area { 
            flex: 1; 
            background-color: #ffffff; 
            border-radius: 25px; 
            padding: 10px 18px; 
            border: 1px solid #e1e1e1;
        }

        input { width: 100%; background: none; border: none; color: #3b4a54; outline: none; font-size: 15px; }
        
        #sendBtn {
            background: #008069; border: none; width: 45px; height: 45px; border-radius: 50%;
            color: white; cursor: pointer; display: flex; justify-content: center; align-items: center;
        }

        .bubble a { color: #027eb5; text-decoration: underline; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>Fórmula APK</h2>
        <p style="color: #667781; margin-bottom: 20px; font-size: 14px;">Identifique-se para entrar no chat</p>
        <input type="text" id="userNameInput" placeholder="Seu nome ou apelido..." maxlength="15">
        <button id="enterChatBtn">ENTRAR NO CHAT</button>
    </div>
</div>

<div id="app">
    <header>
        <div class="avatar">F</div>
        <div class="status-info">
            <p>Fórmula APK - Chat</p>
            <span>online</span>
        </div>
    </header>

    <div id="chat-window"></div>

    <footer>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Digite uma mensagem..." autocomplete="off">
        </div>
        <button id="sendBtn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
            </svg>
        </button>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMrqpOWBx4KwQ3RdorOsWwJp2xUVh4bX0",
      authDomain: "chat-a6f41.firebaseapp.com",
      projectId: "chat-a6f41",
      storageBucket: "chat-a6f41.firebasestorage.app",
      messagingSenderId: "704027996440",
      appId: "1:704027996440:web:abf03cf5df02d044eeae6d",
      measurementId: "G-82X1Y6B15E"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messagesCol = collection(db, "mensagens_premium");

    let NOME_USUARIO = "";
    const MEU_ID = "user_" + Math.floor(Math.random() * 9999);

    const loginScreen = document.getElementById('login-screen');
    const chatApp = document.getElementById('app');
    const userNameInput = document.getElementById('userNameInput');
    const enterChatBtn = document.getElementById('enterChatBtn');

    enterChatBtn.onclick = () => {
        const nome = userNameInput.value.trim();
        if(nome !== "") {
            NOME_USUARIO = nome;
            loginScreen.style.display = "none";
            chatApp.style.display = "flex";
        }
    };

    function linkify(text) {
        const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
    }

    async function sendMessage() {
        const textInput = document.getElementById('msgInput');
        const text = textInput.value.trim();
        if (text !== "" && NOME_USUARIO !== "") {
            try {
                await addDoc(messagesCol, {
                    texto: text,
                    nome: NOME_USUARIO,
                    senderId: MEU_ID,
                    timestamp: serverTimestamp()
                });
                textInput.value = "";
            } catch (e) { console.error(e); }
        }
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    const q = query(messagesCol, orderBy("timestamp", "asc"));
    onSnapshot(q, (snapshot) => {
        const chatWindow = document.getElementById('chat-window');
        chatWindow.innerHTML = "";
        snapshot.docs.forEach(doc => {
            const data = doc.data();
            const isMe = data.senderId === MEU_ID;
            const time = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";

            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'sent' : 'received'}`;
            
            const nomeExibicao = isMe ? "" : `<span class="sender-name">${data.nome || 'Anônimo'}</span>`;
            const textoComLinks = linkify(data.texto);
            
            div.innerHTML = `${nomeExibicao}${textoComLinks} <span class="time">${time}</span>`;
            chatWindow.appendChild(div);
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
    });
</script>
</body>
</html>
