<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fórmula APK - Premium Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #008069;
            --primary-dark: #005e4e;
            --bg-light: #f0f2f5;
            --chat-bg: #efeae2;
            --white: #ffffff;
            --sent: #dcf8c6;
            --received: #ffffff;
            --notify-color: #e67e22;
            --text-main: #111b21;
            --text-sub: #667781;
            --danger: #e74c3c;
            --verified: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body { 
            background-color: #d1d7db; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; width: 100vw;
            color: #3b4a54; overflow: hidden;
        }

        #youtube-player-container { position: absolute; width: 1px; height: 1px; overflow: hidden; left: -100px; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 3000; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo {
            width: 80px; height: 80px; background: linear-gradient(135deg, var(--primary), #00bfa5);
            border-radius: 20px; display: flex; justify-content: center; align-items: center;
            color: white; font-size: 28px; font-weight: 900; margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        .loader { width: 30px; height: 30px; border: 3px solid rgba(0, 128, 105, 0.1); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* Login */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-light); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: white; padding: 35px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 90%; max-width: 350px; }
        .login-box h2 { color: var(--primary); margin-bottom: 10px; font-weight: 800; }
        .login-box p.behavior-alert { font-size: 11px; color: var(--text-sub); margin-bottom: 15px; }
        .login-box input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e1e1e1; margin-bottom: 15px; outline: none; text-align: center; }
        .login-box button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        /* App Layout */
        #app { width: 100%; max-width: 1000px; height: 100%; display: none; background: white; overflow: hidden; position: relative; }
        #main-chat { flex: 1; display: flex; flex-direction: column; background-color: var(--chat-bg); height: 100%; }
        
        header { background: rgba(248, 249, 250, 0.95); backdrop-filter: blur(10px); padding: 10px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 100; }
        .header-avatar { width: 38px; height: 38px; background: var(--primary); border-radius: 10px; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 10px; font-size: 14px; position: relative; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.05); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .sender-name { font-size: 11px; font-weight: 700; color: #d35400; cursor: pointer; display: block; margin-bottom: 2px; }
        
        .sent { background-color: var(--sent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background-color: var(--received); align-self: flex-start; border-bottom-left-radius: 2px; }
        .time { font-size: 9px; color: var(--text-sub); float: right; margin-top: 4px; margin-left: 8px; }

        footer { background-color: #f8f9fa; padding: 10px 15px; border-top: 1px solid rgba(0,0,0,0.05); }
        .input-row { display: flex; align-items: center; gap: 10px; }
        .input-area { flex: 1; background: white; border-radius: 20px; padding: 8px 16px; border: 1px solid #e1e1e1; }
        .input-area input { width: 100%; border: none; outline: none; font-size: 14px; }
        .send-btn { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        #reply-preview { background: #ffffff; border-left: 3px solid var(--primary); padding: 8px; border-radius: 8px; display: none; position: relative; margin-bottom: 5px; }
        #notifyBtn { background: rgba(230, 126, 34, 0.12); border: none; color: var(--notify-color); font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div id="youtube-player-container"><div id="player"></div></div>

<div id="splash-screen">
    <div class="splash-logo">APK</div>
    <div class="loader"></div>
</div>

<div id="login-screen">
    <div class="login-box">
        <h2>Fórmula APK</h2>
        <p class="behavior-alert">⚠️ Seja respeitoso. Spam ou ofensas geram banimento.</p>
        <input type="text" id="userNameInput" placeholder="Seu apelido..." maxlength="15">
        <button id="enterChatBtn">ENTRAR NO CHAT</button>
    </div>
</div>

<div id="app">
    <main id="main-chat">
        <header>
            <div class="header-avatar">APK</div>
            <div class="header-info">
                <p>Chat Global Premium</p>
                <button id="notifyBtn">🔔 Ver Resposta</button>
            </div>
        </header>
        <div id="chat-window"></div>
        <footer>
            <div id="reply-preview">
                <div id="cancel-reply" style="position:absolute; right:10px; cursor:pointer">×</div>
                <span id="reply-user-label" style="font-size:10px; color:var(--primary); font-weight:800;"></span>
                <p id="reply-text-label" style="font-size:12px; color:#666;"></p>
            </div>
            <div class="input-row">
                <div class="input-area"><input type="text" id="msgInput" placeholder="Mensagem..." autocomplete="off"></div>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </footer>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMrqpOWBx4KwQ3RdorOsWwJp2xUVh4bX0",
      authDomain: "chat-a6f41.firebaseapp.com",
      projectId: "chat-a6f41",
      storageBucket: "chat-a6f41.firebasestorage.app",
      messagingSenderId: "704027996440",
      appId: "1:704027996440:web:abf03cf5df02d044eeae6d"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);
    const auth = getAuth(fbApp);
    
    let NOME_USUARIO = "";
    const MEU_ID = "user_" + Math.floor(Math.random() * 1000000);
    let REPLY_DATA = null;
    let ULTIMA_RESPOSTA_ID = null;
    let COOLDOWN = false;

    // Proteção contra nomes mal-intencionados que tentam se passar pela equipe
    const NOMES_BLOQUEADOS = ["FORMULA APK", "ADMIN", "ADM", "SUPORTE", "MODERADOR"];

    // YouTube Player
    var ytPlayer;
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = () => {
        ytPlayer = new YT.Player('player', {
            height: '0', width: '0',
            playerVars: { 'listType': 'playlist', 'list': 'PLRBp0Fe2Gpgn8Y9qI-p0aTxVtw8onBSFj', 'loop': 1, 'autoplay': 0 }
        });
    };

    // Splash Loader
    window.onload = () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.visibility = 'hidden', 800);
        }, 1500);
    };

    signInAnonymously(auth);

    // Login logic - Estrutura Original Mantida
    document.getElementById('enterChatBtn').onclick = () => {
        const input = document.getElementById('userNameInput').value.trim();
        if(!input) return;

        // Bloqueia se o usuário tentar usar nomes protegidos para enganar outros
        if (NOMES_BLOQUEADOS.includes(input.toUpperCase())) {
            alert("Este nome é reservado pelo sistema.");
            return;
        }

        if(ytPlayer?.playVideo) ytPlayer.playVideo();

        NOME_USUARIO = input;

        document.getElementById('login-screen').style.display = "none";
        document.getElementById('app').style.display = "flex";
        
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        carregarGlobal();
    };

    // Firestore Real-time - Sem funções de Deletar para Segurança
    function carregarGlobal() {
        const q = query(collection(db, "mensagens_premium"), orderBy("timestamp", "desc"), limit(40));
        
        onSnapshot(q, (snap) => {
            const win = document.getElementById('chat-window');
            const docs = snap.docs.reverse();
            win.innerHTML = "";
            
            docs.forEach(d => {
                const data = d.data();
                const isMe = data.senderId === MEU_ID;
                const time = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                
                // Sanitização contra ataques de script (XSS)
                const textoSeguro = data.texto.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                const div = document.createElement('div');
                div.className = `bubble ${isMe ? 'sent' : 'received'}`;
                div.id = d.id;

                if(!isMe && data.replyTo?.nome === NOME_USUARIO) {
                    ULTIMA_RESPOSTA_ID = d.id;
                    document.getElementById('notifyBtn').style.display = "block";
                }

                const nameHTML = `<span class="sender-name" onclick="setReply('${data.nome}', '${textoSeguro}')">${data.nome}</span>`;
                const replyHTML = data.replyTo ? `<div class="reply-box" style="background:rgba(0,0,0,0.05); padding:5px; border-radius:5px; font-size:11px; margin-bottom: 5px;"><strong>${data.replyTo.nome}:</strong> ${data.replyTo.texto}</div>` : "";

                div.innerHTML = `${nameHTML}${replyHTML}${textoSeguro} <span class="time">${time}</span>`;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    async function enviar() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim() || COOLDOWN) return;

        const payload = {
            texto: input.value,
            nome: NOME_USUARIO,
            senderId: MEU_ID,
            timestamp: serverTimestamp()
        };
        if(REPLY_DATA) payload.replyTo = REPLY_DATA;

        try {
            COOLDOWN = true;
            await addDoc(collection(db, "mensagens_premium"), payload);
            input.value = ""; REPLY_DATA = null;
            document.getElementById('reply-preview').style.display = "none";
            setTimeout(() => COOLDOWN = false, 2000); // 2s anti-spam
        } catch(e) { COOLDOWN = false; }
    }

    window.setReply = (n, t) => {
        REPLY_DATA = { nome: n, texto: t };
        document.getElementById('reply-user-label').innerText = "Respondendo a " + n;
        document.getElementById('reply-text-label').innerText = t;
        document.getElementById('reply-preview').style.display = "block";
        document.getElementById('msgInput').focus();
    };

    document.getElementById('sendBtn').onclick = enviar;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
    document.getElementById('cancel-reply').onclick = () => {
        REPLY_DATA = null;
        document.getElementById('reply-preview').style.display = "none";
    };
    document.getElementById('notifyBtn').onclick = () => {
        const el = document.getElementById(ULTIMA_RESPOSTA_ID);
        if(el) el.scrollIntoView({ behavior: 'smooth' });
        document.getElementById('notifyBtn').style.display = "none";
    };
</script>
</body>
</html>
